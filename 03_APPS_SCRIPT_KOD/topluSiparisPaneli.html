<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, sans-serif; color:#10233f; background:#f3f6fa; }
    .shell { padding:18px; max-width:1380px; margin:0 auto; }
    h2 { margin:0 0 14px; font-size:24px; }
    .order { background:#fff; border:1px solid #d8e2ef; border-radius:8px; padding:14px; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:repeat(12, 1fr); gap:10px; align-items:end; }
    .c2 { grid-column:span 2; } .c3 { grid-column:span 3; } .c4 { grid-column:span 4; } .c6 { grid-column:span 6; } .c12 { grid-column:span 12; }
    label { display:block; font-size:12px; font-weight:700; margin-bottom:5px; }
    input, select { width:100%; border:1px solid #c8d4e3; border-radius:6px; padding:9px; font-size:14px; }
    button { border:0; border-radius:7px; padding:10px 14px; font-weight:700; cursor:pointer; }
    .primary { background:#0f766e; color:#fff; }
    .secondary { background:#e8eef6; color:#10233f; }
    .danger { background:#fee2e2; color:#991b1b; }
    .bar { display:flex; gap:10px; justify-content:flex-end; margin:14px 0; }
    #status { white-space:pre-wrap; background:#fff; border:1px solid #d8e2ef; border-radius:8px; padding:12px; min-height:90px; }
  </style>
</head>
<body>
<div class="shell">
  <h2>Toplu sipariş paneli</h2>
  <div id="orders"></div>
  <div class="bar">
    <button class="secondary" onclick="addOrder()">Sipariş bloğu ekle</button>
    <button class="secondary" onclick="google.script.host.close()">Kapat</button>
    <button class="primary" onclick="saveAll()">Toplu kaydet ve ERP güncelle</button>
  </div>
  <div id="status">Toplu kayıt bekleniyor.</div>
</div>

<script>
  let meta = { products: [], paymentSources: [], cargoCompanies: [], today: "" };
  function esc(v) { return String(v == null ? "" : v).replace(/[&<>"']/g, s => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[s])); }
  function opts(list, key) { return (list || []).map(x => `<option value="${esc(key ? x[key] : x)}">${esc(key ? x[key] : x)}</option>`).join(""); }
  function addOrder(data = {}) {
    const n = document.querySelectorAll(".order").length + 1;
    const div = document.createElement("div");
    div.className = "order";
    div.innerHTML = `
      <h3>${n}. Müşteri Siparişi</h3>
      <div class="grid">
        <div class="c2"><label>WhatsApp_Tel</label><input class="tel" value="${esc(data.whatsAppTel || "")}"></div>
        <div class="c3"><label>Sipariş_Sahibi</label><input class="owner" value="${esc(data.siparisSahibi || "")}"></div>
        <div class="c3"><label>Kargo_Alıcısı</label><input class="receiver" value="${esc(data.kargoAlicisi || "")}"></div>
        <div class="c2"><label>Kargo_Tel</label><input class="cargoTel" value="${esc(data.kargoTel || "")}"></div>
        <div class="c2"><label>Kargo_Firması</label><select class="cargoCompany">${opts(meta.cargoCompanies)}</select></div>
        <div class="c2"><label>Ürün</label><select class="product">${opts(meta.products, "name")}</select></div>
        <div class="c1"><label>Miktar</label><input class="qty" value="${esc(data.miktar || 1)}"></div>
        <div class="c2"><label>Birim fiyat</label><input class="price" value="${esc(data.birimFiyat || "")}"></div>
        <div class="c3"><label>Ödeme_Yapan</label><input class="payer" value="${esc(data.odemeYapan || "")}"></div>
        <div class="c2"><label>Ödeme_Tutarı</label><input class="amount" value="${esc(data.odemeTutari || "")}"></div>
        <div class="c2"><label>Ödeme_Tarihi</label><input type="date" class="date" value="${esc(data.odemeTarihi || meta.today)}"></div>
        <div class="c2"><label>İl</label><input class="city" value="${esc(data.il || "")}"></div>
        <div class="c2"><label>İlçe</label><input class="district" value="${esc(data.ilce || "")}"></div>
        <div class="c6"><label>Adres</label><input class="address" value="${esc(data.adres || "")}"></div>
        <div class="c1"><button class="danger" onclick="this.closest('.order').remove()">Sil</button></div>
      </div>`;
    document.getElementById("orders").appendChild(div);
  }
  function collectOrder(row) {
    const payer = row.querySelector(".payer").value;
    const amount = row.querySelector(".amount").value;
    return {
      whatsAppTel: row.querySelector(".tel").value,
      siparisSahibi: row.querySelector(".owner").value,
      urunler: [{ urunAdi: row.querySelector(".product").value, odemeYapan: payer, miktar: row.querySelector(".qty").value, birim: "Adet", birimFiyatKdvDahil: row.querySelector(".price").value, kdvOrani: "0,20" }],
      odemeler: [{ odemeYapan: payer, odemeTutari: amount, odemeTarihi: row.querySelector(".date").value, odemeTeyitKaynagi: "Manuel", odemeYapanTel: row.querySelector(".tel").value, odemeYapanAdres: row.querySelector(".address").value, odemeYapanIl: row.querySelector(".city").value, odemeYapanIlce: row.querySelector(".district").value }],
      kargo: { kargoAlicisi: row.querySelector(".receiver").value || row.querySelector(".owner").value, kargoTel: row.querySelector(".cargoTel").value || row.querySelector(".tel").value, il: row.querySelector(".city").value, ilce: row.querySelector(".district").value, adres: row.querySelector(".address").value, kargoFirmasi: row.querySelector(".cargoCompany").value }
    };
  }
  function saveAll() {
    const payloads = [...document.querySelectorAll(".order")].map(collectOrder);
    document.getElementById("status").textContent = "Toplu kayıt çalışıyor...";
    google.script.run.withSuccessHandler(res => {
      document.getElementById("status").textContent = `Sonuç: ${res.ok ? "OK" : "Kontrol gerekli"}\nAdet: ${res.count}\nSüre: ${res.elapsedMs} ms\n` + (res.results || []).map((r, i) => `${i + 1}. ${r.ok ? r.openId : r.error}`).join("\n");
    }).withFailureHandler(err => {
      document.getElementById("status").textContent = "HATA: " + err.message;
    }).topluUltraSiparisKaydet(payloads);
  }
  google.script.run.withSuccessHandler(data => {
    meta = data || meta;
    for (let i = 0; i < 3; i++) addOrder();
  }).getDialogData();
</script>
</body>
</html>
