<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root { --line:#d7e2ee; --ink:#0f233f; --soft:#f5f8fc; --brand:#0f766e; --bad:#b91c1c; --warn:#b45309; }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; font-family:Arial, sans-serif; color:var(--ink); background:#eef3f8; }
    .shell { width:100vw; height:100vh; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    h2 { margin:0; font-size:24px; }
    .orders { flex:1; overflow:auto; padding-bottom:84px; }
    .order-card { background:#fff; border:1px solid var(--line); border-radius:8px; margin:0 0 14px; padding:14px; }
    .order-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .order-title { font-weight:800; color:#0f766e; }
    section { border:1px solid #e5edf6; border-radius:8px; padding:12px; margin:10px 0; background:#fbfdff; }
    h3 { margin:0 0 10px; color:#0f766e; font-size:16px; }
    label { display:block; font-weight:700; font-size:12px; margin:0 0 5px; }
    input, select, textarea { width:100%; border:1px solid #c8d4e3; border-radius:6px; padding:9px; font-size:13px; background:#fff; }
    textarea { min-height:58px; resize:vertical; }
    .grid { display:grid; grid-template-columns:repeat(12, minmax(0, 1fr)); gap:10px; align-items:end; }
    .c1 { grid-column:span 1; } .c2 { grid-column:span 2; } .c3 { grid-column:span 3; } .c4 { grid-column:span 4; }
    .c5 { grid-column:span 5; } .c6 { grid-column:span 6; } .c8 { grid-column:span 8; } .c12 { grid-column:span 12; }
    .line { border:1px solid #dde8f4; border-radius:8px; padding:10px; margin:8px 0; background:#fff; }
    button { border:0; border-radius:7px; padding:10px 13px; font-weight:700; cursor:pointer; }
    .primary { background:#0f766e; color:#fff; }
    .secondary { background:#e8eef6; color:#10233f; }
    .danger { background:#fee2e2; color:#991b1b; }
    .footer { position:fixed; left:0; right:0; bottom:0; background:#f8fafc; border-top:1px solid var(--line); padding:12px 16px; display:flex; justify-content:flex-end; gap:10px; }
    .status { white-space:pre-wrap; border:1px solid var(--line); border-radius:8px; padding:10px; background:#fff; min-height:72px; }
    .badge { display:inline-block; padding:3px 7px; border-radius:999px; background:#e8eef6; margin-right:6px; font-size:12px; }
    .readonly { background:#f4f7fb; }
    .silver { display:none; }
    .line.is-silver .silver { display:block; }
    @media (max-width:1100px) { .grid { grid-template-columns:repeat(6, minmax(0, 1fr)); } .c8,.c6,.c5,.c4,.c3,.c2,.c1 { grid-column:span 6; } }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <h2>Ultra sipariş paneli</h2>
    <button class="secondary" onclick="addOrder()">Yeni sipariş ekle</button>
  </div>
  <div id="orders" class="orders"></div>
</div>
<div class="footer">
  <button class="secondary" onclick="checkAll()">Kontrol et</button>
  <button class="secondary" onclick="invoiceCargo()">Fatura ve Kargo oluştur</button>
  <button class="secondary" onclick="google.script.host.close()">Kapat</button>
  <button class="primary" onclick="saveAll()">Kaydet ve ERP güncelle</button>
</div>

<template id="orderTemplate">
  <div class="order-card">
    <div class="order-head">
      <div class="order-title"></div>
      <button class="danger remove-order" onclick="removeOrder(this)">Siparişi kaldır</button>
    </div>
    <section>
      <h3>Müşteri</h3>
      <div class="grid">
        <div class="c3"><label>WhatsApp_Tel</label><input data-field="whatsAppTel" data-role="phone"></div>
        <div class="c3"><label>Sipariş_Sahibi</label><input data-field="siparisSahibi" data-role="person"></div>
        <div class="c6"><label>Ham_WhatsApp_Mesajı</label><textarea data-field="hamWhatsappMesaji"></textarea></div>
        <div class="c4"><label>Hızlı_Ürün_Girişi</label><input data-field="hizliUrunGirisi"></div>
        <div class="c4"><label>Hızlı_Ödeme_Girişi</label><input data-field="hizliOdemeGirisi"></div>
        <div class="c4"><label>Hızlı_Kargo_Girişi</label><input data-field="hizliKargoGirisi"></div>
      </div>
    </section>
    <section>
      <h3>Kargo</h3>
      <div class="grid">
        <div class="c3"><label>Kargo_Alıcısı</label><input data-field="kargoAlicisi" data-role="person"></div>
        <div class="c3"><label>Kargo_Tel</label><input data-field="kargoTel" data-role="phone"></div>
        <div class="c2"><label>İl</label><input data-field="il" data-role="city"></div>
        <div class="c2"><label>İlçe</label><input data-field="ilce" data-role="city"></div>
        <div class="c2"><label>Kargo_Firması</label><select data-field="kargoFirmasi" class="cargo-company"></select></div>
        <div class="c8"><label>Adres</label><input data-field="adres"></div>
        <div class="c4"><label>Paket_Notu</label><input data-field="paketNotu"></div>
      </div>
    </section>
    <section>
      <h3>Ürünler</h3>
      <div class="products"></div>
      <button class="secondary" onclick="addProductLine(cardOf(this))">Ürün satırı ekle</button>
    </section>
    <section>
      <h3>Ödemeler</h3>
      <div class="payments"></div>
      <button class="secondary" onclick="addPaymentLine(cardOf(this))">Ödeme satırı ekle</button>
    </section>
    <section>
      <h3>Fatura / Cari</h3>
      <div class="invoice-blocks"></div>
    </section>
    <section>
      <h3>Kontrol Özeti</h3>
      <div class="status">Kontrol bekleniyor.</div>
    </section>
  </div>
</template>

<script>
  let meta = { products: [], paymentSources: [], cargoCompanies: [], today: "" };
  let orderSeq = 0;

  function esc(v) { return String(v == null ? "" : v).replace(/[&<>"']/g, s => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[s])); }
  function cardOf(el) { return el.closest(".order-card"); }
  function field(card, name) { return card.querySelector(`[data-field="${name}"]`); }
  function value(card, name) { const el = field(card, name); return el ? el.value : ""; }
  function setValue(card, name, val, force) {
    const el = field(card, name);
    if (!el) return;
    if (!force && el.dataset.touched === "1") return;
    if (!force && el.value && el.dataset.auto !== "1") return;
    el.value = val || "";
    if (force) {
      delete el.dataset.auto;
      return;
    }
    if (val) el.dataset.auto = "1";
  }
  function optionList(rows, valueKey, labelKey) {
    return (rows || []).map(r => {
      const value = typeof r === "string" ? r : r[valueKey];
      const label = typeof r === "string" ? r : (r[labelKey] || r[valueKey]);
      return `<option value="${esc(value)}">${esc(label)}</option>`;
    }).join("");
  }
  function titleCaseTR(v) {
    const expanded = expandJoinedPersonNameTR(String(v || "").trim());
    return expanded.replace(/\s+/g, " ").split(" ").filter(Boolean)
      .map(x => x.charAt(0).toLocaleUpperCase("tr-TR") + x.slice(1).toLocaleLowerCase("tr-TR")).join(" ");
  }
  function expandJoinedPersonNameTR(v) {
    const raw = String(v || "").trim().replace(/\s+/g, " ");
    if (!raw || raw.includes(" ")) return raw;
    const key = raw.toLocaleLowerCase("tr-TR");
    const known = {
      "mehmetnuriçetin": "mehmet nuri çetin",
      "mehmetnuricetin": "mehmet nuri çetin",
      "nimeçetin": "nime çetin",
      "nimecetin": "nime çetin",
      "bedihaçetin": "bediha çetin",
      "bedihacetin": "bediha çetin",
      "yaşarçetin": "yaşar çetin",
      "yasarcetin": "yaşar çetin",
      "emrahçetin": "emrah çetin",
      "emrahcetin": "emrah çetin"
    };
    return known[key] || raw;
  }
  function personReadyTR(v) {
    return titleCaseTR(v).split(/\s+/).filter(Boolean).length >= 2;
  }
  function phoneDigits(v) {
    const d = String(v || "").replace(/\D/g, "");
    return d;
  }
  function completePhoneTR(v) {
    const d = phoneDigits(v);
    if (!d) return "";
    if (d.length === 10 && d[0] === "5") return "+90" + d;
    if (d.length === 11 && d[0] === "0" && d[1] === "5") return "+90" + d.slice(1);
    if (d.length === 12 && d.startsWith("90") && d[2] === "5") return "+" + d;
    return "";
  }
  function phoneTR(v) {
    return completePhoneTR(v) || String(v || "").trim();
  }
  function cityTR(v) { return titleCaseTR(v); }
  function num(v) { return Number(String(v || "").replace(/\./g, "").replace(",", ".")) || 0; }
  function fmt(v) { return v ? Number(v).toFixed(2) : ""; }
  function productByName(name) { return (meta.products || []).find(p => p.name === name) || {}; }

  function addOrder(data = {}) {
    const tpl = document.getElementById("orderTemplate").content.cloneNode(true);
    const card = tpl.querySelector(".order-card");
    card.dataset.orderNo = String(++orderSeq);
    card.querySelector(".order-title").textContent = `${orderSeq}. Müşteri Siparişi`;
    card.querySelector(".cargo-company").innerHTML = optionList(meta.cargoCompanies || []);
    card.querySelector(".cargo-company").value = "Aras Kargo";
    document.getElementById("orders").appendChild(card);
    bindCard(card);
    addPaymentLine(card, data.odeme || {});
    addProductLine(card, data.urun || {});
    if (data.whatsAppTel) field(card, "whatsAppTel").value = data.whatsAppTel;
    if (data.siparisSahibi) field(card, "siparisSahibi").value = data.siparisSahibi;
    applyCustomerDefaults(card);
    refreshOrderTitles();
    return card;
  }

  function removeOrder(btn) {
    const card = cardOf(btn);
    if (document.querySelectorAll(".order-card").length > 1) card.remove();
    refreshOrderTitles();
  }

  function refreshOrderTitles() {
    [...document.querySelectorAll(".order-card")].forEach((card, i) => {
      card.querySelector(".order-title").textContent = `${i + 1}. Müşteri Siparişi${card.dataset.openId ? " | " + card.dataset.openId : ""}`;
      card.querySelector(".remove-order").style.display = document.querySelectorAll(".order-card").length > 1 ? "" : "none";
    });
  }

  function bindCard(card) {
    card.querySelectorAll("input, textarea, select").forEach(el => {
      el.addEventListener("input", () => {
        el.dataset.touched = "1";
        delete el.dataset.auto;
        if (el.classList.contains("odemeYapan")) {
          syncPaymentDefaults(card);
          rebuildInvoiceBlocks(card);
        }
      });
      el.addEventListener("blur", () => normalizeField(card, el));
    });
    field(card, "whatsAppTel").addEventListener("input", () => applyCustomerDefaults(card));
    field(card, "siparisSahibi").addEventListener("input", () => applyCustomerDefaults(card));
    ["kargoAlicisi", "il", "ilce", "adres", "kargoTel"].forEach(name => field(card, name).addEventListener("input", () => {
      syncPaymentDefaults(card);
      rebuildInvoiceBlocks(card);
    }));
  }

  function normalizeField(card, el) {
    if (el.dataset.role === "person") el.value = titleCaseTR(el.value);
    if (el.dataset.role === "phone") {
      const phone = completePhoneTR(el.value);
      if (phone) el.value = phone;
    }
    if (el.dataset.role === "city") el.value = cityTR(el.value);
    if (["kargoAlicisi", "kargoTel", "il", "ilce", "adres"].includes(el.dataset.field)) {
      syncPaymentDefaults(card);
      rebuildInvoiceBlocks(card);
    }
    if (el.classList.contains("odemeYapan")) rebuildInvoiceBlocks(card);
    if (el.classList.contains("odemeYapan") || el.classList.contains("odemeTutari")) refreshPayerOptions(card);
  }

  function applyCustomerDefaults(card) {
    const owner = titleCaseTR(value(card, "siparisSahibi"));
    const phone = completePhoneTR(value(card, "whatsAppTel"));
    if (owner && personReadyTR(owner)) {
      setValue(card, "kargoAlicisi", owner, false);
    }
    if (phone) {
      setValue(card, "kargoTel", phone, false);
    }
    syncPaymentDefaults(card);
    rebuildInvoiceBlocks(card);
    if (!phone) return;
    card.querySelector(".status").textContent = "Müşteri hafızası kontrol ediliyor...";
    google.script.run.withSuccessHandler(res => {
      if (!res || !res.ok) return;
      if (!owner && res.owner) setValue(card, "siparisSahibi", res.owner, false);
      if (res.cargo) {
        setValue(card, "kargoAlicisi", res.cargo.receiver || owner, false);
        setValue(card, "kargoTel", completePhoneTR(res.cargo.phone || "") || phone, false);
        setValue(card, "il", res.cargo.city || "", false);
        setValue(card, "ilce", res.cargo.district || "", false);
        setValue(card, "adres", res.cargo.address || "", false);
        if (res.cargo.company) {
          const cargoCompany = field(card, "kargoFirmasi");
          if (cargoCompany && cargoCompany.dataset.touched !== "1") cargoCompany.value = res.cargo.company;
        }
      }
      if (res.openOrder && res.openOrder.id) card.dataset.openId = res.openOrder.id;
      syncPaymentDefaults(card);
      rebuildInvoiceBlocks(card);
      refreshOrderTitles();
      card.querySelector(".status").textContent = res.openOrder ? `Açık sipariş bulundu: ${res.openOrder.id}` : "Müşteri hafızası kontrol edildi.";
    }).getUltraPanelHazirlik(phone);
  }

  function setAutoInput(row, selector, val) {
    const el = row.querySelector(selector);
    if (!el || !val) return;
    if (el.dataset.touched === "1") return;
    if (!el.value || el.dataset.auto === "1") {
      el.value = val;
      el.dataset.auto = "1";
    }
  }

  function syncPaymentDefaults(card) {
    const owner = titleCaseTR(value(card, "siparisSahibi"));
    const phone = completePhoneTR(value(card, "kargoTel")) || completePhoneTR(value(card, "whatsAppTel"));
    const city = cityTR(value(card, "il"));
    const district = cityTR(value(card, "ilce"));
    const address = value(card, "adres");
    card.querySelectorAll(".payments .line").forEach(row => {
      if (owner && personReadyTR(owner)) setAutoInput(row, ".odemeYapan", owner);
      setAutoInput(row, ".odemeYapanTel", phone);
      setAutoInput(row, ".odemeYapanTcknVkn", "11111111111");
      setAutoInput(row, ".odemeYapanIl", city);
      setAutoInput(row, ".odemeYapanIlce", district);
      setAutoInput(row, ".odemeYapanAdres", address);
    });
  }

  function payerNames(card) {
    return [...new Set([...card.querySelectorAll(".odemeYapan")].map(x => titleCaseTR(x.value)).filter(Boolean))];
  }
  function payerOptions(card, selected) {
    const names = payerNames(card);
    return (names.length ? names : [""]).map(n => `<option ${n === selected ? "selected" : ""} value="${esc(n)}">${esc(n || "Ödeme bekliyor")}</option>`).join("");
  }
  function refreshPayerOptions(card) {
    const names = payerNames(card);
    card.querySelectorAll(".productPayer").forEach(sel => {
      const current = sel.value;
      sel.innerHTML = payerOptions(card, current);
      if (!current && names.length === 1) sel.value = names[0];
    });
  }

  function addProductLine(card, data = {}) {
    const wrap = document.createElement("div");
    wrap.className = "line";
    wrap.innerHTML = `
      <div class="grid">
        <div class="c2"><label>Ürün</label><select class="urunAdi">${optionList(meta.products, "name", "name")}</select></div>
        <div class="c3"><label>Ödeme yapan / fatura kişisi</label><select class="productPayer">${payerOptions(card, data.odemeYapan || "")}</select></div>
        <div class="c1"><label>Miktar</label><input class="miktar" value="${esc(data.miktar || 1)}"></div>
        <div class="c1"><label>Birim</label><input class="birim" value="${esc(data.birim || "Adet")}"></div>
        <div class="c2"><label>Birim fiyat</label><input class="birimFiyatKdvDahil" value="${esc(data.birimFiyatKdvDahil || "")}"></div>
        <div class="c1"><label>KDV</label><input class="kdvOrani" value="${esc(data.kdvOrani || "0,20")}"></div>
        <div class="c1"><label>KDV hariç</label><input class="kdvHaric readonly" readonly></div>
        <div class="c1"><label>KDV tutarı</label><input class="kdvTutari readonly" readonly></div>
        <div class="c2"><label>Toplam</label><input class="toplamKdvDahil readonly" readonly></div>
        <div class="c2"><label>Paraşüt ürün ID</label><input class="parasutUrunId readonly" readonly></div>
        <div class="c12 silver"><div class="grid">
          <div class="c2"><label>Gram</label><input class="gumusGram"></div>
          <div class="c2"><label>Alış fiyatı</label><input class="gumusAlisBirim"></div>
          <div class="c2"><label>Satış fiyatı</label><input class="gumusSatisBirim"></div>
          <div class="c2"><label>KDV modeli</label><select class="kdvModeli"><option>Standart KDV</option><option>KDV 0</option><option>11 katmanı karar verecek</option></select></div>
          <div class="c2"><label>Marj</label><input class="gumusMarj readonly" readonly></div>
        </div></div>
        <div class="c1"><button class="danger" onclick="this.closest('.line').remove()">Sil</button></div>
      </div>`;
    card.querySelector(".products").appendChild(wrap);
    wrap.querySelector(".urunAdi").value = data.urunAdi || "Tesbih";
    wrap.querySelector(".urunAdi").addEventListener("change", () => productChanged(wrap));
    wrap.querySelectorAll("input").forEach(el => el.addEventListener("blur", () => calcProduct(wrap)));
    productChanged(wrap);
    refreshPayerOptions(card);
  }

  function productChanged(row) {
    const name = row.querySelector(".urunAdi").value;
    const cfg = productByName(name);
    row.classList.toggle("is-silver", name === "Gümüş");
    row.querySelector(".birim").value = cfg.unit || (name === "Gümüş" ? "Gram" : "Adet");
    row.querySelector(".kdvOrani").value = String(cfg.vatRate == null ? 0.20 : cfg.vatRate).replace(".", ",");
    row.querySelector(".parasutUrunId").value = cfg.productId || "";
    calcProduct(row);
  }

  function calcProduct(row) {
    const qty = num(row.querySelector(".miktar").value) || 1;
    const unit = num(row.querySelector(".birimFiyatKdvDahil").value);
    const gross = qty * unit;
    const rate = num(row.querySelector(".kdvOrani").value);
    const net = rate ? gross / (1 + rate) : gross;
    row.querySelector(".toplamKdvDahil").value = fmt(gross);
    row.querySelector(".kdvHaric").value = fmt(net);
    row.querySelector(".kdvTutari").value = fmt(gross - net);
    const gram = num(row.querySelector(".gumusGram") && row.querySelector(".gumusGram").value);
    const cost = num(row.querySelector(".gumusAlisBirim") && row.querySelector(".gumusAlisBirim").value);
    if (row.querySelector(".gumusMarj")) row.querySelector(".gumusMarj").value = gram && cost ? fmt(gross - gram * cost) : "";
  }

  function addPaymentLine(card, data = {}) {
    const wrap = document.createElement("div");
    wrap.className = "line";
    wrap.innerHTML = `
      <div class="grid">
        <div class="c3"><label>Ödeme_Yapan</label><input class="odemeYapan" value="${esc(data.odemeYapan || "")}"></div>
        <div class="c2"><label>Tutar</label><input class="odemeTutari" value="${esc(data.odemeTutari || "")}"></div>
        <div class="c2"><label>Tarih</label><input type="date" class="odemeTarihi" value="${esc(data.odemeTarihi || meta.today)}"></div>
        <div class="c2"><label>Kaynak</label><select class="odemeTeyitKaynagi">${optionList(meta.paymentSources)}</select></div>
        <div class="c3"><label>Dekont</label><input class="dekontReferans" value="${esc(data.dekontReferans || "")}"></div>
        <div class="c2"><label>Ödeme_Yapan_Tel</label><input class="odemeYapanTel" value="${esc(data.odemeYapanTel || completePhoneTR(value(card, "whatsAppTel")) || "")}"></div>
        <div class="c2"><label>Ödeme_Yapan_TCKN_VKN</label><input class="odemeYapanTcknVkn" value="${esc(data.odemeYapanTcknVkn || "11111111111")}"></div>
        <div class="c2"><label>Ödeme_Yapan_İl</label><input class="odemeYapanIl" value="${esc(data.odemeYapanIl || value(card, "il"))}"></div>
        <div class="c2"><label>Ödeme_Yapan_İlçe</label><input class="odemeYapanIlce" value="${esc(data.odemeYapanIlce || value(card, "ilce"))}"></div>
        <div class="c4"><label>Ödeme_Yapan_Adres</label><input class="odemeYapanAdres" value="${esc(data.odemeYapanAdres || value(card, "adres"))}"></div>
        <div class="c1"><button class="danger" onclick="removePaymentLine(this)">Sil</button></div>
      </div>`;
    card.querySelector(".payments").appendChild(wrap);
    wrap.querySelector(".odemeTeyitKaynagi").value = data.odemeTeyitKaynagi || "Manuel";
    wrap.querySelectorAll("input,select").forEach(el => {
      el.addEventListener("input", () => {
        el.dataset.touched = "1";
        delete el.dataset.auto;
        syncPaymentDefaults(card);
        rebuildInvoiceBlocks(card);
        refreshPayerOptions(card);
      });
      el.addEventListener("blur", () => {
        if (el.classList.contains("odemeYapan")) el.value = titleCaseTR(el.value);
        if (el.classList.contains("odemeYapanTel")) {
          const phone = completePhoneTR(el.value);
          if (phone) el.value = phone;
        }
        if (el.classList.contains("odemeYapanIl") || el.classList.contains("odemeYapanIlce")) el.value = cityTR(el.value);
        rebuildInvoiceBlocks(card);
        refreshPayerOptions(card);
      });
    });
    syncPaymentDefaults(card);
    rebuildInvoiceBlocks(card);
    refreshPayerOptions(card);
  }

  function removePaymentLine(btn) {
    const card = cardOf(btn);
    btn.closest(".line").remove();
    rebuildInvoiceBlocks(card);
    refreshPayerOptions(card);
  }

  function existingInvoiceValues(card) {
    const out = {};
    card.querySelectorAll(".invoice-line").forEach(line => {
      const name = line.querySelector(".faturaKisisi").value;
      out[name] = {};
      line.querySelectorAll("input,select").forEach(el => out[name][el.className.split(" ")[0]] = el.value);
    });
    return out;
  }

  function rebuildInvoiceBlocks(card) {
    syncPaymentDefaults(card);
    const prior = existingInvoiceValues(card);
    const area = card.querySelector(".invoice-blocks");
    area.innerHTML = "";
    payerNames(card).forEach((payer, idx) => {
      const pLine = [...card.querySelectorAll(".payments .line")].find(r => titleCaseTR(r.querySelector(".odemeYapan").value) === payer);
      const saved = prior[payer] || {};
      const tax = saved.faturaTcknVkn || (pLine && pLine.querySelector(".odemeYapanTcknVkn").value) || "11111111111";
      const tel = saved.faturaTel || (pLine && pLine.querySelector(".odemeYapanTel").value) || value(card, "kargoTel") || value(card, "whatsAppTel");
      const city = saved.faturaIl || (pLine && pLine.querySelector(".odemeYapanIl").value) || value(card, "il");
      const district = saved.faturaIlce || (pLine && pLine.querySelector(".odemeYapanIlce").value) || value(card, "ilce");
      const address = saved.faturaAdres || (pLine && pLine.querySelector(".odemeYapanAdres").value) || value(card, "adres");
      const email = saved.faturaEmail || "";
      const block = document.createElement("div");
      block.className = "line invoice-line";
      block.innerHTML = `
        <div><span class="badge">Fatura/Cari ${idx + 1}</span><strong>${esc(payer)}</strong></div>
        <div class="grid">
          <div class="c3"><label>Fatura_Kişisi</label><input class="faturaKisisi readonly" readonly value="${esc(payer)}"></div>
          <div class="c2"><label>Cari_Tipi</label><select class="cariTipi"><option>Gerçek Kişi</option><option>Tüzel Kişi</option></select></div>
          <div class="c2"><label>Fatura_Tel</label><input class="faturaTel" value="${esc(phoneTR(tel))}"></div>
          <div class="c2"><label>Fatura_Eposta</label><input class="faturaEmail" value="${esc(email)}"></div>
          <div class="c2"><label>Fatura_TCKN_VKN</label><input class="faturaTcknVkn" value="${esc(tax || "11111111111")}"></div>
          <div class="c3"><label>Fatura_Vergi_Dairesi</label><input class="faturaVergiDairesi" value="${esc(saved.faturaVergiDairesi || "")}"></div>
          <div class="c2"><label>Fatura_İl</label><input class="faturaIl" value="${esc(cityTR(city))}"></div>
          <div class="c2"><label>Fatura_İlçe</label><input class="faturaIlce" value="${esc(cityTR(district))}"></div>
          <div class="c3"><label>E_Belge_Tipi</label><input class="eBelgeTipi readonly" readonly value="${tax === "11111111111" ? "e-Arşiv" : "e-Belge Mükellef Kontrol Gerekli"}"></div>
          <div class="c3"><label>Paraşüt_Cari_ID</label><input class="parasutCariId" value="${esc(saved.parasutCariId || "")}"></div>
          <div class="c2"><label>Cari_Eşleşme_Güven_Puanı</label><input class="cariPuan readonly" readonly value="${esc(saved.cariPuan || "")}"></div>
          <div class="c3"><label>Cari_Eşleşme_Durumu</label><input class="cariDurum readonly" readonly value="${esc(saved.cariDurum || "Cari çözümü gerekli")}"></div>
          <div class="c4"><label>Cari_Aksiyon</label><input class="cariAksiyon readonly" readonly value="${esc(saved.cariAksiyon || "Kaydet sırasında aday aranacak")}"></div>
          <div class="c8"><label>Fatura_Adres</label><input class="faturaAdres" value="${esc(address)}"></div>
          <div class="c2"><button type="button" class="secondary cari-auto">Cari seç / ara</button></div>
          <div class="c2"><button type="button" class="secondary cari-create">Cari oluştur</button></div>
        </div>`;
      block.querySelector(".cariTipi").value = saved.cariTipi || "Gerçek Kişi";
      block.querySelectorAll("input,select").forEach(el => {
        el.addEventListener("input", () => { el.dataset.touched = "1"; });
        el.addEventListener("blur", () => {
          if (el.classList.contains("faturaTel")) {
            const phone = completePhoneTR(el.value);
            if (phone) el.value = phone;
          }
          if (el.classList.contains("faturaIl") || el.classList.contains("faturaIlce")) el.value = cityTR(el.value);
        });
      });
      block.querySelector(".cari-auto").addEventListener("click", () => resolveCari(card, block, "auto"));
      block.querySelector(".cari-create").addEventListener("click", () => resolveCari(card, block, "create"));
      area.appendChild(block);
    });
    refreshPayerOptions(card);
  }

  function collectOrder(card) {
    syncPaymentDefaults(card);
    const urunler = [...card.querySelectorAll(".products .line")].map(row => ({
      urunAdi: row.querySelector(".urunAdi").value,
      odemeYapan: row.querySelector(".productPayer").value,
      miktar: row.querySelector(".miktar").value,
      birim: row.querySelector(".birim").value,
      birimFiyatKdvDahil: row.querySelector(".birimFiyatKdvDahil").value,
      kdvOrani: row.querySelector(".kdvOrani").value,
      gumusGram: row.querySelector(".gumusGram") ? row.querySelector(".gumusGram").value : "",
      gumusAlisBirim: row.querySelector(".gumusAlisBirim") ? row.querySelector(".gumusAlisBirim").value : "",
      gumusSatisBirim: row.querySelector(".gumusSatisBirim") ? row.querySelector(".gumusSatisBirim").value : "",
      gumusTutarTipi: "Birim"
    }));
    const odemeler = [...card.querySelectorAll(".payments .line")].map(row => ({
      odemeYapan: row.querySelector(".odemeYapan").value,
      odemeTutari: row.querySelector(".odemeTutari").value,
      odemeTarihi: row.querySelector(".odemeTarihi").value,
      odemeTeyitKaynagi: row.querySelector(".odemeTeyitKaynagi").value,
      dekontReferans: row.querySelector(".dekontReferans").value,
      odemeYapanTel: phoneTR(row.querySelector(".odemeYapanTel").value),
      odemeYapanTcknVkn: row.querySelector(".odemeYapanTcknVkn").value || "11111111111",
      odemeYapanAdres: row.querySelector(".odemeYapanAdres").value,
      odemeYapanIl: row.querySelector(".odemeYapanIl").value,
      odemeYapanIlce: row.querySelector(".odemeYapanIlce").value
    }));
    const faturalar = [...card.querySelectorAll(".invoice-line")].map(row => ({
      faturaKisisi: row.querySelector(".faturaKisisi").value,
      cariTipi: row.querySelector(".cariTipi").value,
      faturaTel: phoneTR(row.querySelector(".faturaTel").value),
      faturaEmail: row.querySelector(".faturaEmail").value,
      faturaTcknVkn: row.querySelector(".faturaTcknVkn").value || "11111111111",
      faturaVergiDairesi: row.querySelector(".faturaVergiDairesi").value,
      faturaIl: row.querySelector(".faturaIl").value,
      faturaIlce: row.querySelector(".faturaIlce").value,
      faturaAdres: row.querySelector(".faturaAdres").value,
      eBelgeTipi: row.querySelector(".eBelgeTipi").value,
      parasutCariId: row.querySelector(".parasutCariId").value
    }));
    return {
      openId: card.dataset.openId || "",
      whatsAppTel: phoneTR(value(card, "whatsAppTel")),
      siparisSahibi: value(card, "siparisSahibi"),
      hamWhatsappMesaji: value(card, "hamWhatsappMesaji"),
      hizliUrunGirisi: value(card, "hizliUrunGirisi"),
      hizliOdemeGirisi: value(card, "hizliOdemeGirisi"),
      hizliKargoGirisi: value(card, "hizliKargoGirisi"),
      urunler, odemeler, faturalar,
      kargo: {
        kargoAlicisi: value(card, "kargoAlicisi"),
        kargoTel: phoneTR(value(card, "kargoTel")),
        il: value(card, "il"),
        ilce: value(card, "ilce"),
        adres: value(card, "adres"),
        kargoFirmasi: value(card, "kargoFirmasi"),
        paketNotu: value(card, "paketNotu")
      }
    };
  }

  function resolveCari(card, line, mode) {
    const openId = card.dataset.openId || "";
    if (!openId) {
      setCardStatus(card, "Cari çözümü için önce Kaydet ve ERP güncelle çalıştırılmalı.");
      return;
    }
    const payer = line.querySelector(".faturaKisisi").value;
    const contactId = line.querySelector(".parasutCariId").value;
    setCardStatus(card, `${payer} için cari çözümü çalışıyor...`);
    google.script.run.withSuccessHandler(res => {
      if (res.contactId) line.querySelector(".parasutCariId").value = res.contactId;
      if (res.score) line.querySelector(".cariPuan").value = res.score;
      if (res.status) line.querySelector(".cariDurum").value = res.status;
      line.querySelector(".cariAksiyon").value = res.ok ? "Cari bağlı" : (res.status || "Operatör onayı gerekli");
      const liveInfo = res.livePost ? `\nCanlı cari POST: ${res.livePost}` : "";
      setCardStatus(card, `${payer}: ${res.status || "Cari sonucu alındı"}${liveInfo}`);
    }).withFailureHandler(err => setCardStatus(card, "HATA: " + (err.message || err)))
      .parasutCariPanelAksiyonu(openId, payer, mode, contactId);
  }

  function cards() { return [...document.querySelectorAll(".order-card")]; }
  function setCardStatus(card, msg) { card.querySelector(".status").textContent = msg; }
  function summarize(res) {
    if (!res) return "Yanıt alınamadı";
    if (res.control && res.control.summary) return `${res.status || ""}\nAçık_Sipariş_ID: ${res.openId || ""}\nSüre: ${res.elapsedMs || ""} ms\n${res.control.summary.join("\n")}`;
    if (res.issues) return res.issues.join("\n");
    return JSON.stringify(res, null, 2);
  }

  function checkAll() {
    cards().forEach(card => {
      setCardStatus(card, "Kontrol ediliyor...");
      google.script.run.withSuccessHandler(res => setCardStatus(card, res.ok ? "12_KONTROL_MERKEZI temiz" : summarize(res)))
        .withFailureHandler(err => setCardStatus(card, "HATA: " + (err.message || err)))
        .ultraSiparisKontrolEt(collectOrder(card));
    });
  }

  function saveAll() {
    const list = cards().map(collectOrder);
    cards().forEach(card => setCardStatus(card, "Kaydediliyor..."));
    if (list.length === 1) {
      google.script.run.withSuccessHandler(res => {
        const card = cards()[0];
        card.dataset.openId = res.openId || "";
        refreshOrderTitles();
        setCardStatus(card, summarize(res));
      }).withFailureHandler(err => setCardStatus(cards()[0], "HATA: " + (err.message || err))).ultraSiparisKaydet(list[0]);
      return;
    }
    google.script.run.withSuccessHandler(res => {
      cards().forEach((card, i) => {
        const r = (res.results || [])[i] || {};
        card.dataset.openId = r.openId || card.dataset.openId || "";
        setCardStatus(card, summarize(r));
      });
      refreshOrderTitles();
    }).withFailureHandler(err => cards().forEach(card => setCardStatus(card, "HATA: " + (err.message || err)))).topluUltraSiparisKaydet(list);
  }

  function invoiceCargo() {
    const card = cards().find(c => c.dataset.openId) || cards()[0];
    const openId = card.dataset.openId || "";
    if (!openId) { setCardStatus(card, "Önce Kaydet ve ERP güncelle çalıştırılmalı."); return; }
    setCardStatus(card, "Fatura/kargo son kontrol ediliyor...");
    google.script.run.withSuccessHandler(res => setCardStatus(card, res.ok ? summarize(res) : summarize(res)))
      .withFailureHandler(err => setCardStatus(card, "HATA: " + (err.message || err)))
      .faturaVeKargoOlustur(openId);
  }

  google.script.run.withSuccessHandler(data => {
    meta = data || meta;
    addOrder();
  }).getDialogData();
</script>
</body>
</html>
